<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — СНТ «Клин»</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">К</div>
        <div>
          <div class="logo-title">СНТ «Клин»</div>
          <div class="logo-sub">Садовое товарищество</div>
        </div>
      </a>
      <nav id="site-nav" class="nav-links" aria-label="Основное меню"></nav>
    </div>
  </header>

  <main class="form-page">
    <div class="card">
      <h1 style="margin-bottom:24px;font-size:28px">Вход в личный кабинет</h1>

      <div id="login-error" class="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="petrov@example.ru">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Войти</button>
      </form>

      <div class="form-hint">
        <strong>Демо-доступ (для HTML-версии):</strong><br><br>
        <strong>Житель:</strong> petrov@example.ru / resident123<br>
        <strong>Админ:</strong> admin@snt-klin.ru / admin123
      </div>
    </div>
  </main>

  <script src="js/nav.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
